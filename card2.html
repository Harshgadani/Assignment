<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card - Richard Taylor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            width: 320px;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .card-img-top-wrapper {
            background-color: #a0a0a0;
            /* Gray background behind avatar from image */
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 350px;
            overflow: hidden;
        }

        .card-img-top-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 1.5rem;
            background-color: #f1f3f5;
            /* Light gray body background as seen in image */
        }

        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            color: #212529;
            margin-bottom: 0.5rem;
        }

        .card-text {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            padding: 8px 20px;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #004085;
        }
    </style>
</head>

<body>

    <div class="card profile-card">
        <div class="card-img-top-wrapper">
            <!-- Replace this src with your actual avatar image -->
            <img src="https://i.pravatar.cc/400?u=richard" alt="Richard Taylor">
        </div>
        <div class="card-body">
            <h5 class="card-title">Richard Taylor</h5>
            <p class="card-text">Some example text.</p>
            <a href="#" class="btn btn-primary">See Profile</a>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
